name: Update README Ordnerstruktur

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ordnerstruktur generieren und README updaten
        run: |
          python3 - <<'EOF'
          import re
          import subprocess

          result = subprocess.run(
              ["find", ".", "-not", "-path", "./.git/*", "-not", "-path", "./.github/*"],
              capture_output=True, text=True
          )

          lines = sorted(result.stdout.strip().split("\n"))
          tree = "\n".join(lines)

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          new_block = f"<!-- TREE_START -->\n```\n{tree}\n```\n<!-- TREE_END -->"

          updated = re.sub(
              r"<!-- TREE_START -->.*?<!-- TREE_END -->",
              new_block,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(updated)

          print("README.md aktualisiert!")
          EOF

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: Ordnerstruktur automatisch aktualisiert"
          git push origin main
